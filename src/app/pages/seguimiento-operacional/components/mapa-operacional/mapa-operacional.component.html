<section class="mapa-panel" [class.mapa-panel-fullscreen]="fullscreenExterno">
  <div class="mapa-head">
    <div>
      <span class="mapa-kicker">Mapa táctico</span>
      <h3>{{ titulo }}</h3>
      <p>{{ descripcion }}</p>
    </div>

    <div class="mapa-actions">
      <span class="mapa-chip">{{ renderModel.totals.visibles }} visibles</span>
      <span class="mapa-chip">{{ renderModel.totals.pelotones }} pelotones</span>
      <span class="mapa-chip">{{ renderModel.totals.alertas }} alertas</span>
      <span class="mapa-chip">{{ renderModel.totals.movimientos }} movimientos</span>
      <button type="button" class="mapa-button mapa-button-primary" (click)="solicitarFullscreen()">
        {{ fullscreenExterno ? 'Salir fullscreen' : 'Pantalla completa' }}
      </button>
    </div>
  </div>

  <div class="mapa-stage">
    <div class="mapa-legend" *ngIf="renderModel.legendItems.length">
      <span class="mapa-kicker">Leyenda</span>
      <div class="legend-list">
        <div class="legend-item" *ngFor="let item of renderModel.legendItems; trackBy: trackLegend">
          <span class="legend-dot" [class]="item.className"></span>
          <span>{{ item.label }}</span>
        </div>
      </div>
    </div>

    <div #leafletMap class="leaflet-host" aria-label="Mapa táctico operacional"></div>
  </div>
</section>

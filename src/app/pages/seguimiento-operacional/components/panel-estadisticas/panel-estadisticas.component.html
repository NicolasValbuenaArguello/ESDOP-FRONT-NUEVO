<section class="panel_block" *ngIf="tabla.length">
  <div class="panel_block_head">
    <span class="panel_badge">Estadisticas</span>
    <h3>Lectura tabular</h3>
  </div>

  <div class="tabla_operacional">
    <table>
      <thead>
        <tr>
          <th>Unidad</th>
          <th>Sector</th>
          <th>Prioridad</th>
          <th>Estado</th>
          <th>Actualizacion</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let fila of tabla; trackBy: trackByRow">
          <td>{{ fila.unidad }}</td>
          <td>{{ fila.sector }}</td>
          <td><span class="tabla_badge" [class]="'tabla_badge tabla_badge_' + fila.prioridad">{{ fila.prioridad }}</span></td>
          <td>{{ fila.estado }}</td>
          <td>{{ fila.actualizacion }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

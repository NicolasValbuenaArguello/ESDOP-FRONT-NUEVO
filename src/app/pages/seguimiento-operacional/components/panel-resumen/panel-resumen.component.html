<section class="panel_block" *ngIf="seccion as actual">
  <div class="panel_block_head">
    <span class="panel_badge">Resumen operacional</span>
    <h3>{{ actual.nombre }}</h3>
  </div>

  <div class="resumen_strip">
    <div class="resumen_item">
      <span>Estado</span>
      <strong>{{ actual.estado }}</strong>
    </div>
    <div class="resumen_item">
      <span>Etiqueta</span>
      <strong>{{ actual.etiqueta }}</strong>
    </div>
    <div class="resumen_item">
      <span>Vista</span>
      <strong>{{ actual.descripcion }}</strong>
    </div>
  </div>

  <div class="chip_stack">
    <span class="panel_chip" *ngFor="let capacidad of actual.capacidades; trackBy: trackByCapacidad">{{ capacidad }}</span>
  </div>
</section>

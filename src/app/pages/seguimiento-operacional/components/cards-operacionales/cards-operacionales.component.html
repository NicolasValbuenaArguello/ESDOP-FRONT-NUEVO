<section class="resumen_grid" *ngIf="metricas.length">
  <article class="resumen_card" *ngFor="let metrica of metricas; trackBy: trackByMetric">
    <span>{{ metrica.label }}</span>
    <strong>{{ metrica.valor }}</strong>
    <small>{{ metrica.tendencia }}</small>
  </article>
</section>

<section class="cards_grid" *ngIf="cards.length">
  <article class="info_card" *ngFor="let card of cards; trackBy: trackByCard" [class]="'info_card tono-' + card.tono">
    <div class="info_card_head">
      <span class="info_card_badge">{{ card.titulo }}</span>
      <i class="bi" [class]="card.icono"></i>
    </div>

    <strong>{{ card.valor }}</strong>
    <p>{{ card.descripcion }}</p>
  </article>
</section>
